<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inferno Étterem és Pizzéria</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #bc0000; --orange: #ff4500; --dark: #0a0a0a; --grey: #1a1a1a; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--dark); color: white; margin: 0; padding-bottom: 120px; }
        header { background: #000; text-align: center; border-bottom: 4px solid var(--red); padding: 20px; }
        h1 { font-family: 'Oswald', sans-serif; color: var(--red); text-transform: uppercase; margin: 10px 0; font-size: 2.5rem; }
        .business-info { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; }
        .promo-banner { background: linear-gradient(90deg, #ff4500, #bc0000); color: white; text-align: center; padding: 12px; font-family: 'Oswald', sans-serif; font-size: 1.1rem; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 30px; padding: 20px; }
        @media (max-width: 950px) { .container { grid-template-columns: 1fr; } }
        h2 { font-family: 'Oswald', sans-serif; border-left: 5px solid var(--red); padding-left: 15px; margin-top: 40px; text-transform: uppercase; color: #eee; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--grey); border-radius: 12px; padding: 20px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .card h3 { margin: 0 0 8px 0; color: #fff; font-size: 1.1rem; }
        .card p { font-size: 0.85rem; color: #aaa; margin: 0 0 15px 0; min-height: 40px; line-height: 1.3; }
        .price { color: var(--orange); font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .add-btn { background: var(--red); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .cart-box { background: #111; padding: 25px; border-radius: 15px; border: 2px solid var(--red); position: sticky; top: 20px; height: fit-content; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid #222; }
        .order-btn { background: #28a745; color: white; width: 100%; border: none; padding: 18px; margin-top: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .order-btn:disabled { background: #444; cursor: not-allowed; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .side-select { border: 1px solid var(--red); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="promo-banner">
    🔥 ÁPRILISI AKCIÓ: MINDEN 32CM-ES PIZZA CSAK 3000 FT! 🔥
</div>

<header>
    <div class="business-info">
        <strong>Inferno Étterem és Pizzéria</strong> | 1042 Budapest, Király utca 25 | +3670/743-00-49
    </div>
    <h1>Inferno Étterem és Pizzéria</h1>
    <div id="open-status" style="font-weight: bold; margin-top: 10px; font-size: 1.2rem;"></div>
</header>

<div class="container">
    <div id="main-menu"></div>

    <div class="cart-box">
        <h3>🛒 Kosarad</h3>
        <select id="delivery-option" onchange="up()">
            <option value="590">Házhozszállítás (590 Ft)</option>
            <option value="0">Helyben átvétel (0 Ft)</option>
        </select>
        <div id="cart-content">Üres...</div>
        <div style="margin-top:15px; border-top: 1px solid #444; padding-top:10px;">
            <div class="cart-item">Dobozdíj (200 Ft/étel): <span id="box-fee">0</span> Ft</div>
            <h3 style="color:var(--orange)">Összesen: <span id="total-price">0</span> Ft</h3>
        </div>
        <input type="text" id="user-name" placeholder="Név">
        <input type="text" id="user-addr" placeholder="Cím (Irsz, Város, Utca, Házszám)">
        <input type="tel" id="user-tel" placeholder="Telefon">
        <button class="order-btn" id="submit-btn" onclick="send()">RENDELÉS LEADÁSA</button>
    </div>
</div>

<script>
    // --- BEÁLLÍTÁS: MAI ZÁRVA TARTÁS ---
    const kenyszerZaras = false; // Holnap reggel írd át FALSE-ra!
    // ----------------------------------

    const sidesData = [
        {n: "Nem kérek köretet", p: 0}, {n: "Rizs", p: 990}, {n: "Hasábburgonya", p: 990},
        {n: "Steak burgonya", p: 1190}, {n: "Édes burgonya", p: 1390}, {n: "Burgonyapüré", p: 1190}
    ];

    const menuData = [
        { cat: "ELŐÉTELEK", items: [
            ["Olasz-magyar vegyes ízelítő", 3590, "pármai sonka, olasz pikáns szalámi, prosciutto cotto, olivabogyó, gorgonzola, taleggio, szárított paradicsom, rozmaringos pizzakenyér"],
            ["Padlizsánkrém", 3190, "pizzakenyérrel, friss zöldségekkel"],
            ["Bruschetta pizzakenyérrel", 2990, "paradicsom, bazsalikom, fokhagyma"]
        ]},
        { cat: "LEVESEK", items: [
            ["Húsleves gazdagon", 2590, "levesbetét, csirke, zöldségek"],
            ["Toszkán Paradicsomleves", 2590, "mozzarella golyóval"],
            ["Gulyásleves (marhahúsból)", 3700]
        ]},
        { cat: "TÉSZTÁK", items: [
            ["Arrabiata penne", 3190, "paradicsomszósz, chili, fokhagyma"],
            ["Klasszik Bolognai spagetti", 3590, "hagyományos húsos raguval"],
            ["Eredeti Carbonara", 4190, "guanchale, parmezán, tojás"],
            ["Alfredo penne csirkével", 4190, "tejszín, fokhagyma, csirkemell"],
            ["Gambero tagliatellével", 4990, "garnélarák, házi vörös pesto, tejszín"]
        ]},
        { cat: "FŐÉTELEK", items: [
            ["Rántott Mozzarella sajt", 3100], ["Juhtúrós sztrapacska", 3990], ["Harcsapaprikás túrógombóccal", 5490], ["Brassói aprópecsenye", 4090]
        ]},
        { cat: "PIZZÁK (32 cm) - AKCIÓ!", items: [
            ["Margherita", 3290, "pizzaszósz, mozzarella, friss bazsalikom, paradicsomkarika"], 
            ["Prosciutto", 3590, "pizzaszósz, mozzarella, sonka"], 
            ["Funghi", 3290, "pizzaszósz, mozzarella, gomba"], 
            ["Prosciutto e Funghi", 3650, "pizzaszósz, sonka, gomba"], 
            ["Mais", 3790, "pizzaszósz, mozzarella, sonka, gomba, kukorica, petrezselyem, fokhagyma"],
            ["Bolognese", 4190, "pizzaszósz, mozzarella, bolognai ragu"], 
            ["Spinaci e Ricotta", 3690, "pizzaszósz, mozzarella, spenót, ricotta"], 
            ["Tonno", 3990, "pizzaszósz, mozzarella, tonhal, olivabogyó, lilahagyma"], 
            ["Salame", 3890, "pizzaszósz, mozzarella, pikáns olasz szalámi"], 
            ["Quattro Formaggi", 4190, "pizzaszósz, mozzarella, gorgonzola, füstölt sajt, parmezán"],
            ["Beatriche", 4490, "fokhagymás tejföl, mozzarella, csirkemell, juhtúró, kapor, kaliforniai paprika"], 
            ["Pizza ala Pesto", 3990, "pizzaszósz, mozzarella, mascarpone, házi pesto, ruccola, koktélparadicsom"], 
            ["Lucifer", 4390, "pizzaszósz, mozzarella, kukorica, bab, bacon, marharagu, lilahagyma, chili olaj"], 
            ["Capriciosa", 4190, "pizzaszósz, mozzarella, sonka, gomba, articsóka, olivabogyó"], 
            ["Luna", 4190, "fokhagymás tejföl, mozzarella, csirke, bacon, friss spenót, fokhagyma"],
            ["Parma di Ruccola", 4390, "pizzaszósz, mozzarella, rukkola, koktélparadicsom, pármai sonka, parmezán"], 
            ["Inferno", 4090, "pizzaszósz, mozzarella, olasz pikáns szalámi, pepperóni paprika"], 
            ["BBQ Pizza", 4190, "Bbq alap, mozzarella, csirkemell, lilahagyma, füstölt sajt, csemegeuborka"], 
            ["Vespa", 4290, "fokhagymás tejföl, mozzarella, sonka, bacon, olasz szalámi, lilahagyma, hegyes erős"],
            ["Carne", 4290, "pizzaszósz, mozzarella, bacon, sonka, olasz szalámi, lilahagyma, kolbász, hegyes erős"], 
            ["Dolce Vita", 4590, "tejszín alap, mozzarella, dió, kecskesajt, füge, pármai sonka, méz"], 
            ["Hawaii", 3690, "pizzaszósz, mozzarella, sonka, ananász"], 
            ["Tenger Kincsei", 4590, "pizzaszósz, mozzarella, tenger gyümölcsei, citrom, olivabogyó"]
        ]},
        { cat: "DESSZERTEK", items: [["Házi Tiramisu", 2190], ["Palacsinta (2db)", 1490], ["Sajttorta", 2190]]}
    ];

    let cart = [];

    function render() {
        const div = document.getElementById('main-menu');
        div.innerHTML = menuData.map((section, sIdx) => {
            const isPizza = section.cat.includes("PIZZÁK");
            const isMain = ["FŐÉTELEK"].includes(section.cat);
            
            return `<h2>${section.cat}</h2><div class="menu-grid">${section.items.map((p, pIdx) => {
                let sId = `s-${sIdx}-${pIdx}`;
                let finalPrice = isPizza ? 3000 : p[1];
                let ex = isMain ? `<select id="${sId}" class="side-select">${sidesData.map(s=>`<option value="${s.n}|${s.p}">${s.n} (+${s.p} Ft)</option>`).join('')}</select><button class="add-btn" onclick="addS('${p[0]}',${finalPrice},'${sId}')">Kosárba</button>` :
                                  `<button class="add-btn" onclick="add('${p[0]}',${finalPrice})">Kosárba</button>`;
                
                return `<div class="card">
                            <h3>${p[0]}</h3>
                            <p>${p[2]||''}</p>
                            <div class="price">${isPizza ? '<span style="text-decoration:line-through; font-size:0.8rem; color:#666">'+p[1]+' Ft</span> ' : ''}${finalPrice} Ft</div>
                            ${ex}
                        </div>`;
            }).join('')}</div>`;
        }).join('');
    }

    function check() {
        const b = document.getElementById('submit-btn');
        const s = document.getElementById('open-status');
        const now = new Date();
        const day = now.getDay();
        const min = now.getHours() * 60 + now.getMinutes();
        const start = (day === 0) ? 12*60 : 11*60;
        const end = 21*60 + 30;

        if (kenyszerZaras) {
            b.disabled = true; b.innerText = "MAI NAPRA BEZÁRTUNK";
            s.innerHTML = '<span style="color:#ff4444;">● MAI NAPRA BEZÁRTUNK</span>';
        } else if (day === 1 || min < start || min >= end) {
            b.disabled = true; b.innerText = "JELENLEG ZÁRVA";
            s.innerHTML = `<span style="color:#ff4444;">● JELENLEG ZÁRVA</span><br><small>Nyitás: Holnap 11:00</small>`;
        } else {
            b.disabled = false; b.innerText = "RENDELÉS LEADÁSA";
            s.innerHTML = '<span style="color:#28a745;">● NYITVA VAGYUNK</span>';
        }
    }

    function add(n,p){cart.push({n,p});up();}
    function addS(n,p,id){const v=document.getElementById(id).value.split('|'); add(`${n} (${v[0]})`, p+parseInt(v[1]));}
    function up() {
        const ship = parseInt(document.getElementById('delivery-option').value) || 0;
        let sub = 0; cart.forEach(i => sub += i.p);
        const box = cart.length * 200;
        document.getElementById('cart-content').innerHTML = cart.length ? cart.map((it,i)=>`<div class="cart-item">${it.n} (${it.p} Ft) <span style="cursor:pointer" onclick="cart.splice(${i},1);up()">❌</span></div>`).join('') : 'Üres...';
        document.getElementById('box-fee').innerText = box;
        document.getElementById('total-price').innerText = sub + ship + box;
    }
    function send() {
        const n = document.getElementById('user-name').value;
        const a = document.getElementById('user-addr').value;
        const t = document.getElementById('user-tel').value;
        if(!n || !a || !t || !cart.length) return alert("Kérlek adj meg minden adatot!");
        const msg = `RENDELÉS\nNév: ${n}\nCím: ${a}\nTel: ${t}\nÉtelek:\n${cart.map(i=>"- "+i.n).join('\n')}\nÖsszesen: ${document.getElementById('total-price').innerText} Ft`;
        window.location.href = `mailto:infernoetterem@gmail.com?subject=Rendelés&body=${encodeURIComponent(msg)}`;
    }

    render(); check();
</script>
</body>
</html>
